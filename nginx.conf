events { }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # 🔥 Blazor / SPA routing fix
        location / {
            try_files $uri $uri/ /index.html;
        }

        # 🔥 Correct MIME types (VERY IMPORTANT for Blazor WASM)
        types {
            text/html html;
            text/css css;
            application/javascript js;
            application/wasm wasm;
            application/json json;
            image/svg+xml svg;
        }

        # Prevent download behavior caused by mis-detection
        add_header X-Content-Type-Options nosniff;
    }
}